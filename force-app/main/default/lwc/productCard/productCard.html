<template>
    <div class={cardClass}>
        <!-- Match Badge -->
        <template lwc:if={matchLabel}>
            <div class={matchBadgeClass}>
                <lightning-icon icon-name={matchIcon} size="xx-small" class="match-icon"></lightning-icon>
                {matchLabel} &mdash; {matchScore}% match
            </div>
        </template>

        <!-- Card Header -->
        <div class="card-header">
            <div class="card-category">
                <lightning-badge label={productCategory}></lightning-badge>
                <lightning-badge label={productTier} class={tierBadgeClass}></lightning-badge>
            </div>
            <h3 class="card-title">{productName}</h3>
            <p class="card-description">{productDescription}</p>
        </div>

        <!-- Pricing -->
        <div class="card-pricing">
            <div class="price-main">
                <span class="price-currency">$</span>
                <span class="price-value">{formattedMonthlyPrice}</span>
                <span class="price-unit">/employee/month</span>
            </div>
            <div class="price-annual">
                ${formattedAnnualPrice}/employee/year (save ~9%)
            </div>
        </div>

        <!-- Recommendation Reasons -->
        <template lwc:if={hasReasons}>
            <div class="card-reasons">
                <h4 class="reasons-label">Why We Recommend This</h4>
                <template for:each={topReasons} for:item="reason">
                    <div key={reason.text} class="reason-item">
                        <lightning-icon icon-name={reason.icon} size="xx-small" class="reason-icon"></lightning-icon>
                        <span>{reason.text}</span>
                    </div>
                </template>
            </div>
        </template>

        <!-- Features -->
        <div class="card-features">
            <h4 class="features-label">Key Features</h4>
            <ul class="features-list">
                <template for:each={displayFeatures} for:item="feature">
                    <li key={feature} class="feature-item">
                        <lightning-icon icon-name="utility:check" size="xx-small" class="feature-check"></lightning-icon>
                        {feature}
                    </li>
                </template>
            </ul>
        </div>

        <!-- Frequently Bought Together -->
        <template lwc:if={hasAffinityProducts}>
            <div class="card-affinity">
                <h4 class="affinity-label">Frequently Bought Together</h4>
                <template for:each={affinityProducts} for:item="affinity">
                    <div key={affinity.productCode} class="affinity-item">
                        <lightning-icon icon-name="utility:linked" size="xx-small" class="affinity-icon"></lightning-icon>
                        <span class="affinity-name">{affinity.productName}</span>
                        <lightning-badge label={affinity.affinityStrength} class="affinity-strength"></lightning-badge>
                    </div>
                </template>
            </div>
        </template>

        <!-- Action -->
        <div class="card-action">
            <template lwc:if={isSelected}>
                <lightning-button
                    variant="success"
                    label="Selected"
                    icon-name="utility:check"
                    onclick={handleDeselect}
                    class="full-width">
                </lightning-button>
            </template>
            <template lwc:else>
                <lightning-button
                    variant="neutral"
                    label="Add to Quote"
                    icon-name="utility:add"
                    onclick={handleSelect}
                    class="full-width">
                </lightning-button>
            </template>
        </div>
    </div>
</template>
