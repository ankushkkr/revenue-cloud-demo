<template>
    <div class={cardClass}>
        <!-- Match Badge -->
        <template lwc:if={matchLabel}>
            <div class={matchBadgeClass}>
                <lightning-icon icon-name={matchIcon} size="xx-small" class="match-icon"></lightning-icon>
                {matchLabel} &mdash; {matchScore}% match
            </div>
        </template>

        <!-- Card Header -->
        <div class="card-header">
            <div class="card-category">
                <lightning-badge label={product.category}></lightning-badge>
                <lightning-badge label={product.tier} class={tierBadgeClass}></lightning-badge>
            </div>
            <h3 class="card-title">{product.name}</h3>
            <p class="card-description">{product.description}</p>
        </div>

        <!-- Pricing -->
        <div class="card-pricing">
            <div class="price-main">
                <span class="price-currency">$</span>
                <span class="price-value">{product.monthlyPrice}</span>
                <span class="price-unit">/employee/month</span>
            </div>
            <div class="price-annual">
                ${product.annualPrice}/employee/year (save ~9%)
            </div>
        </div>

        <!-- Features -->
        <div class="card-features">
            <h4 class="features-label">Key Features</h4>
            <ul class="features-list">
                <template for:each={product.features} for:item="feature">
                    <li key={feature} class="feature-item">
                        <lightning-icon icon-name="utility:check" size="xx-small" class="feature-check"></lightning-icon>
                        {feature}
                    </li>
                </template>
            </ul>
        </div>

        <!-- Action -->
        <div class="card-action">
            <template lwc:if={isSelected}>
                <lightning-button
                    variant="success"
                    label="Selected"
                    icon-name="utility:check"
                    onclick={handleDeselect}
                    class="full-width">
                </lightning-button>
            </template>
            <template lwc:else>
                <lightning-button
                    variant="neutral"
                    label="Add to Quote"
                    icon-name="utility:add"
                    onclick={handleSelect}
                    class="full-width">
                </lightning-button>
            </template>
        </div>
    </div>
</template>
