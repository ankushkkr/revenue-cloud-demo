<template>
    <div class="app-container">
        <!-- Main Content -->
        <main class="main-content">
            <div class="landing-section">
                <div class="hero">
                    <div class="hero-content">
                        <span class="hero-badge">
                            <lightning-icon icon-name="utility:cloud" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                            Salesforce Revenue Cloud
                        </span>
                        <h1 class="hero-title">
                            Transform Your <span class="gradient-text">Revenue Operations</span><br/>with Salesforce
                        </h1>
                        <p class="hero-description">
                            Discover the perfect product suite tailored to your organization's needs.
                            Powered by Salesforce Revenue Cloud for seamless product configuration, pricing, and quoting.
                        </p>
                        <div class="hero-actions">
                            <lightning-button
                                variant="brand"
                                label="Start Discovery"
                                icon-name="utility:forward"
                                icon-position="right"
                                onclick={goToLead}
                                class="slds-m-right_small">
                            </lightning-button>
                            <lightning-button
                                variant="neutral"
                                label="View All Products"
                                onclick={goToProducts}>
                            </lightning-button>
                        </div>
                    </div>
                    <div class="hero-stats">
                        <div class="stat-card">
                            <span class="stat-value">80K+</span>
                            <span class="stat-label">Customers</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-value">150+</span>
                            <span class="stat-label">Countries</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-value">70M+</span>
                            <span class="stat-label">Users Worldwide</span>
                        </div>
                    </div>
                </div>

                <div class="features-section">
                    <h2 class="section-title">Why Revenue Cloud?</h2>
                    <div class="feature-grid">
                        <div class="feature-card">
                            <div class="feature-icon blue">
                                <lightning-icon icon-name="utility:magicwand" size="small"></lightning-icon>
                            </div>
                            <h3>Smart Product Matching</h3>
                            <p>AI-powered recommendations based on your organization's unique requirements, size, and industry.</p>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon green">
                                <lightning-icon icon-name="utility:moneybag" size="small"></lightning-icon>
                            </div>
                            <h3>Dynamic Pricing</h3>
                            <p>Real-time pricing with volume discounts, bundle savings, and custom enterprise rates.</p>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon purple">
                                <lightning-icon icon-name="utility:shield" size="small"></lightning-icon>
                            </div>
                            <h3>Compliant Quoting</h3>
                            <p>Generate audit-ready quotes with approval workflows, version tracking, and digital signatures.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>Salesforce Revenue Cloud Demo</p>
        </footer>
    </div>
</template>
