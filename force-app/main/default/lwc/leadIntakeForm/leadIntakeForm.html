<template>
    <lightning-card title="Product Discovery" icon-name="standard:lead">
        <div class="form-container">
            <div class="form-card">
                <!-- Company Profile -->
                <div class="form-section">
                    <h2 class="section-label">
                        <lightning-icon icon-name="standard:account" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        Company Profile
                    </h2>
                    <div class="form-grid">
                        <lightning-combobox
                            label="Industry"
                            value={industry}
                            options={industryOptions}
                            onchange={handleIndustry}
                            placeholder="Select Industry">
                        </lightning-combobox>
                        <lightning-input
                            type="number"
                            label="Number of Employees"
                            value={employeeCount}
                            onchange={handleEmployeeCount}
                            min="1"
                            placeholder="e.g., 5000">
                        </lightning-input>
                        <lightning-combobox
                            label="Company Size"
                            value={companySize}
                            options={companySizeOptions}
                            onchange={handleCompanySize}
                            placeholder="Select Size">
                        </lightning-combobox>
                    </div>
                </div>

                <!-- Requirements -->
                <div class="form-section">
                    <h2 class="section-label">
                        <lightning-icon icon-name="standard:task" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        What are you looking for? <span class="label-hint">(Select all that apply)</span>
                    </h2>
                    <div class="requirements-grid">
                        <template for:each={requirementOptions} for:item="req">
                            <div
                                key={req.id}
                                class={req.className}
                                onclick={handleRequirementToggle}
                                data-id={req.id}>
                                <lightning-icon icon-name={req.icon} size="x-small" class="req-icon"></lightning-icon>
                                <span class="req-label">{req.label}</span>
                                <template lwc:if={req.selected}>
                                    <lightning-icon icon-name="utility:check" size="xx-small" class="req-check"></lightning-icon>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Additional Notes -->
                <div class="form-section">
                    <lightning-textarea
                        label="Additional Notes"
                        value={notes}
                        onchange={handleNotes}
                        placeholder="Specific challenges, timeline, budget considerations..."
                        max-length="2000">
                    </lightning-textarea>
                </div>

                <!-- Submit -->
                <div class="form-actions">
                    <lightning-button
                        variant="brand"
                        label="Save Discovery Data"
                        icon-name="utility:save"
                        onclick={handleSubmit}
                        disabled={isSubmitting}>
                    </lightning-button>
                </div>
            </div>
        </div>

        <template lwc:if={isSubmitting}>
            <lightning-spinner alternative-text="Saving..." size="small"></lightning-spinner>
        </template>
    </lightning-card>
</template>
